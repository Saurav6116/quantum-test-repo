name: QuantumGuard Validate
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography oqs
      - name: PQC sanity check
        run: |
          python - <<'PY'
          try:
              import oqs
              from cryptography.hazmat.primitives.ciphers.aead import AESGCM
              print('PQC import OK')
          except Exception as e:
              print('PQC sanity check failed:', e)
              raise
          PY
      - name: Verify pqc_helper import
        run: |
          python -c "import pqc_helper; print('pqc_helper OK')"
